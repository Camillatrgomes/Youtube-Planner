<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Video Planner</title>
  <meta name="description" content="Planeje sua fila de vídeos do YouTube com base no seu tempo disponível por dia." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-wrapper">

  <!-- ===== HEADER ===== -->
  <header>
    <div class="logo-icon" aria-hidden="true">
      <!-- YouTube play icon -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M10 8l6 4-6 4V8z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>YouTube Video Planner</h1>
      <p>Planeje sua fila de vídeos de acordo com seu tempo disponível</p>
    </div>
  </header>

  <!-- ===== SEARCH SECTION ===== -->
  <section class="search-section card" aria-labelledby="search-heading">
    <p class="section-label" id="search-heading">🔍 Buscar Vídeos</p>

    <div class="search-row">
      <div class="search-input-wrap">
        <!-- Search icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="searchVideos"
          placeholder="Ex: JavaScript para iniciantes, Python, etc."
          autocomplete="off"
          aria-label="Palavra-chave de busca"
        />
      </div>
      <button class="btn btn-primary" id="btn-search" aria-label="Pesquisar vídeos">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Pesquisar
      </button>
    </div>

    <!-- Error Banner (hidden by default) -->
    <div class="error-banner hidden" id="error-banner" role="alert">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="error-message">Ocorreu um erro.</span>
    </div>
  </section>

  <!-- ===== WEEKLY SCHEDULE SECTION ===== -->
  <section class="schedule-section card" aria-labelledby="schedule-heading">
    <p class="section-label" id="schedule-heading">📅 Tempo Disponível por Dia (minutos)</p>

    <div class="days-grid" id="days-grid">
      <!-- DOM: inputs com id day-0 (Seg) … day-6 (Dom) — gerados pelo JS para aplicar destaque de hoje -->
      <div class="day-cell" id="cell-0">
        <span class="day-label">Seg</span>
        <input type="number" id="day-0" min="0" max="1440" value="0" aria-label="Minutos disponíveis na segunda-feira" />
      </div>
      <div class="day-cell" id="cell-1">
        <span class="day-label">Ter</span>
        <input type="number" id="day-1" min="0" max="1440" value="0" aria-label="Minutos disponíveis na terça-feira" />
      </div>
      <div class="day-cell" id="cell-2">
        <span class="day-label">Qua</span>
        <input type="number" id="day-2" min="0" max="1440" value="0" aria-label="Minutos disponíveis na quarta-feira" />
      </div>
      <div class="day-cell" id="cell-3">
        <span class="day-label">Qui</span>
        <input type="number" id="day-3" min="0" max="1440" value="0" aria-label="Minutos disponíveis na quinta-feira" />
      </div>
      <div class="day-cell" id="cell-4">
        <span class="day-label">Sex</span>
        <input type="number" id="day-4" min="0" max="1440" value="0" aria-label="Minutos disponíveis na sexta-feira" />
      </div>
      <div class="day-cell" id="cell-5">
        <span class="day-label">Sáb</span>
        <input type="number" id="day-5" min="0" max="1440" value="0" aria-label="Minutos disponíveis no sábado" />
      </div>
      <div class="day-cell" id="cell-6">
        <span class="day-label">Dom</span>
        <input type="number" id="day-6" min="0" max="1440" value="0" aria-label="Minutos disponíveis no domingo" />
      </div>
    </div>
  </section>

<div id="result-area" class="hidden">
    <!-- Video List -->
    <section class="video-list-section" aria-labelledby="videolist-heading">
      <div class="results-header">
        <p class="results-title" id="videolist-heading">🎬 Vídeos Retornados</p>
        <button class="btn btn-ghost" id="btn-scroll-top" aria-label="Voltar ao topo">↑ Topo</button>
      </div>

      <!--JS deve renderizar aqui uma lista de .video-item com estrutura-->
     <div id="container">
     </div>
    </section>

</div>

<!-- Seção de Favoritos (aparece independente da busca) -->
<section id="favoritos-section" class="favoritos-section card hidden" aria-labelledby="favoritos-heading">
  <div class="results-header">
    <p class="results-title" id="favoritos-heading">❤️ Favoritos <span id="favoritos-count" class="favoritos-count-badge">0</span></p>
  </div>
  <div id="favoritos-container"></div>
</section>

<script src="JavaScript/script.js"></script>
</body>
</html>
